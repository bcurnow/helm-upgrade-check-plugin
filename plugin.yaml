name: "upgrade-check"
version: "1.0.1"
usage: "check for available upgrades to installed Helm releases"
description: "Identifies Helm releases deployed to the cluster and reports which have newer versions available in configured repositories. Provides upgrade commands for out-of-date releases."
command: "$HELM_PLUGIN_DIR/bin/helm-upgrade-check-plugin_linux_amd64_v1/helm-upgrade-check"
platformCommand:
  - os: linux
    arch: amd64
    command: "$HELM_PLUGIN_DIR/bin/helm-upgrade-check-plugin_linux_amd64_v1/helm-upgrade-check"
  - os: linux
    arch: arm64
    command: "$HELM_PLUGIN_DIR/bin/helm-upgrade-check-plugin_linux_arm64_v8.0/helm-upgrade-check"
  - os: windows
    arch: amd64
    command: "$HELM_PLUGIN_DIR/bin/helm-upgrade-check-plugin_windows_amd64_v1/helm-upgrade-check.exe"
  - os: windows
    arch: arm64
    command: "$HELM_PLUGIN_DIR/bin/helm-upgrade-check-plugin_windows_arm64_v8.0/helm-upgrade-check.exe"
  - os: darwin
    arch: amd64
    command: "$HELM_PLUGIN_DIR/bin/helm-upgrade-check-plugin_darwin_amd64_v1/helm-upgrade-check"
  - os: darwin
    arch: arm64
    command: "$HELM_PLUGIN_DIR/bin/helm-upgrade-check-plugin_darwin_arm64_v8.0/helm-upgrade-check"
ignoreFlags: false
useTunnel: false
